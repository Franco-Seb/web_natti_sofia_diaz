<main class="page-wrap py-14">
  <header class="mb-8">
    <h1 class="section-title">Productos</h1>
    <p class="mt-2 text-olive/80">Selección compacta de frutos secos premium.</p>
  </header>

  <section class="rounded-2xl bg-warmwhite p-4 shadow-soft">
    <div class="grid gap-3 md:grid-cols-[1fr_auto_auto]">
      <input type="search" placeholder="Buscar frutos secos" class="rounded-xl border border-olive/20 px-4 py-2.5 text-sm" />
      <button class="btn-secondary px-4 py-2.5 text-sm">Empacados</button>
      <button class="btn-secondary px-4 py-2.5 text-sm">A granel</button>
    </div>
  </section>

  <section class="mt-8">
    <h2 class="font-heading text-2xl font-bold text-olive">Productos</h2>
    <div class="mt-4 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
      <article *ngFor="let product of products" class="product-card">
        <img class="h-28 w-full rounded-lg object-contain bg-white" [src]="product.image" [alt]="product.name" />
        <h3 class="mt-3 font-heading text-base font-bold">{{ product.name }}</h3>
        <p class="mt-1 text-xs text-olive/75">{{ product.presentation }}</p>
        <p class="mt-2 text-sm font-bold text-walnut">{{ formatPrice(product.price) }}</p>
        <button type="button" (click)="addToCart(product)" class="btn-primary mt-3 w-full py-2 text-xs">Agregar al carrito</button>
      </article>
    </div>
  </section>

  <div class="mt-8 flex flex-wrap gap-3">
    <a routerLink="/carrito" class="btn-primary">Ir al carrito</a>
    <a href="https://wa.me/573215855191" target="_blank" rel="noreferrer" class="inline-flex items-center gap-2 rounded-xl bg-natural px-5 py-3 text-sm font-semibold text-warmwhite"><span class="material-symbols-outlined">chat</span>Comprar por WhatsApp</a>
  </div>
</main>
